version: '3.9'

# Intention Store Service — docker-compose.yml
# Scoped to this service only. Peer services have their own docker-compose.yml.
#
# NOTE: Supabase is a kind:api external dependency — it is NOT added as a
# docker-compose service. Configure via environment variables below.
# IndexedDB is a browser-native API — no docker-compose service needed.

services:
  intention-store:
    build:
      context: .
      dockerfile: Dockerfile
    image: intention-store-service:1.0.0
    container_name: intention-store
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      # Required secrets — must be provided at runtime; no defaults
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      # Optional configuration
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
